app:
  title: Scaffolded Backstage App
  baseUrl: http://localhost:3000

organization:
  name: My Company

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'
  reading:
    allow:
      - host: github.com
      - host: raw.githubusercontent.com  # ✅ Allows reading public files

integrations:
  github:
    - host: github.com  # ✅ No token needed for public repositories

auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${GITHUB_CLIENT_ID}
        clientSecret: ${GITHUB_CLIENT_SECRET}

proxy: {}

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Template]  # ✅ Ensures Backstage allows Templates

  locations:
    - type: url
      target: https://raw.githubusercontent.com/regmisan/backstage-developer-portal/develop/catalog-info.yaml
      rules:
        - allow: [Component, System, API, Resource, Location, Template]

  useUrlReadersSearch: true

permission:
  enabled: true

